name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches:
jobs:

  # Validation job: runs on every push and PR.
  unittest:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    container:
      image: immcantation/test:devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          Rscript tests/setup/install_dep.R
      - name: Update buildignore
        run: |
            sed -i '/test/ d' .Rbuildignore
        shell: bash
      - name: Run Tests
        run: |
            testthat::test_local()
        shell: Rscript {0}
      - name: Generate documentation
        run: |
          devtools::document()
        shell: Rscript {0}
      - name: Check
        env:
          _R_CHECK_CRAN_INCOMING_: false
        run: |
          options(crayon.enabled=TRUE)
          rcmdcheck::rcmdcheck(args = c("--as-cran", "--run-donttest", "--timings"), error_on="warning", check_dir="check")
        shell: Rscript {0}
      - name: Check usage
        run: |
          devtools::install()
          pkg_name <- read.dcf("DESCRIPTION")[1, "Package"]
          library(pkg_name, character.only=T)
          usage_out <- capture.output(codetools::checkUsagePackage(pack=pkg_name))
          if (length(usage_out) > 0) {
            print(usage_out)
            warning("Found issues with code usage.")
          }
        shell: Rscript {0}

  # Publishing job: only runs on pushes to master once validation passes.
  publish:
    needs: unittest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    container:
      image: immcantation/test:devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so the doc-commit push is not rejected
          # due to a shallow clone being behind the remote.
          fetch-depth: 0
      - name: Install dependencies
        run: |
          Rscript tests/setup/install_dep.R
      - name: Render docs
        run: |
          rm -rf docs/topics/* docs/vignettes/*
          Rscript -e "devtools::document()"
          Rscript docs/build.R
        shell: bash
      - name: Commit rendered docs
        # Only commit docs on real pushes to master, not on local `act` runs.
        if: ${{ !env.ACT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGES=$(git status --porcelain docs/ | wc -l)
          if [[ "${CHANGES}" -gt 0 ]]; then
            git add docs/
            git commit -m "[skip ci] Auto-render docs."
            git push
          fi
        shell: bash
      - name: Update container
        # Trigger the Docker Hub build after a successful push to master,
        # but not on local `act` runs.
        if: ${{ !env.ACT }}
        run: |
          curl -H "Content-Type:application/json" --data '{"docker_tag":"devel"}' -X POST https://hub.docker.com/api/build/v1/source/${{ secrets.DOCKERHUB_REPO }}/trigger/${{ secrets.DOCKERHUB_TRIGGER }}/call/
